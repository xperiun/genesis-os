<!DOCTYPE html>
<!-- DS: Control Room (../../agentic-os/docs/design-system-control-room.md) · JARVIS elegante.
     View "Tarefas" do shell: o board do OS do comprador. Cards de 3 fontes (manual no
     painel, do chat "virar task", e do build). Uma IDEIA fica em A fazer inativa; ao ATIVAR
     dispara o build no repo dele. Clicar o card abre o detalhe com o log ao vivo do build. -->
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>Tarefas · Meu OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#0A0D12; --surface-1:#10151C; --surface-2:#161C25; --surface-3:#1D2530;
    --line:#212934; --line-hud:rgba(83,231,234,.20);
    --text:#E6ECF2; --text-dim:#93A0AD; --text-muted:#58646F;
    --cyan:#53E7EA; --cyan-deep:#1C6E77;
    --amber:#E0A44C; --amber-glow:#F5C97A;
    --live:#56C8B0; --warn:#E0A44C; --error:#D2685E;
    --panel-bg:linear-gradient(180deg,rgba(22,28,37,.7),rgba(16,21,28,.7));
    --panel-glow:inset 0 0 30px -20px rgba(83,231,234,.4),0 8px 24px -14px rgba(0,0,0,.6);
    --r-sm:4px; --r-md:8px; --r-lg:12px;
    --fs-micro:10px; --fs-meta:12px; --fs-body:14px; --fs-emph:15px; --fs-card:17px; --fs-title:20px; --fs-detail:24px; --fs-hero:34px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  *{scrollbar-width:thin;scrollbar-color:var(--surface-3) transparent}
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:5px}
  html,body{height:100%;overflow:hidden}
  body{background:var(--void);color:var(--text);font-family:"Space Grotesk",system-ui,sans-serif;
    font-size:var(--fs-body);line-height:1.5;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;height:100vh}
  header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--line);flex:0 0 auto}
  header h1{font-size:var(--fs-title);font-weight:600}header h1 span{font-size:var(--fs-micro);letter-spacing:.22em;color:var(--text-muted);display:block;margin-top:3px;text-transform:uppercase}
  .btn{font-family:"Space Grotesk",sans-serif;border:1px solid var(--cyan);border-radius:var(--r-md);padding:9px 15px;cursor:pointer;font-size:var(--fs-meta);font-weight:600;
    background:var(--surface-2);color:var(--text);box-shadow:0 0 18px -8px rgba(83,231,234,.5),inset 0 0 12px -8px rgba(83,231,234,.4);transition:all .2s}
  .btn:hover{box-shadow:0 0 22px -6px rgba(83,231,234,.7),inset 0 0 14px -6px rgba(83,231,234,.5)}
  .btn.ghost{background:var(--surface-1);border:1px solid var(--line);color:var(--text-dim);font-weight:500;box-shadow:none}
  .btn.ghost:hover{border-color:var(--line-hud);color:var(--text);box-shadow:none}
  .btn.danger{background:rgba(210,104,94,.08);border:1px solid rgba(210,104,94,.45);color:var(--error);box-shadow:none}
  .btn.danger:hover{background:rgba(210,104,94,.16);box-shadow:none}
  .btn:disabled{opacity:.5;cursor:default;box-shadow:none}
  /* novo */
  #novo{padding:0 24px;max-height:0;overflow:hidden;transition:max-height .25s;border-bottom:1px solid transparent}
  #novo.open{max-height:300px;padding:16px 24px;border-bottom-color:var(--line)}
  #novo .row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
  #novo input,#novo textarea,#novo select{background:var(--surface-1);border:1px solid var(--line);border-radius:var(--r-md);color:var(--text);font-family:"Space Grotesk",sans-serif;font-size:var(--fs-body);padding:9px 11px}
  #novo input#f-titulo{flex:1;min-width:220px}#novo textarea{width:100%;resize:vertical;min-height:38px;margin-top:9px}
  #novo select{min-width:150px}
  #novo input:focus,#novo textarea:focus,#novo select:focus{outline:none;border-color:var(--cyan);box-shadow:inset 0 0 16px -12px rgba(83,231,234,.6)}
  /* board */
  .board{flex:1 1 auto;overflow-y:auto;display:grid;grid-template-columns:repeat(3,1fr);gap:16px;padding:20px 24px}
  .col{display:flex;flex-direction:column;min-height:120px}
  .col-h{font-size:var(--fs-micro);letter-spacing:.18em;color:var(--text-dim);text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px;font-weight:500}
  .col-h::before{content:"";width:6px;height:6px;background:var(--cyan);box-shadow:0 0 6px rgba(83,231,234,.7);flex:0 0 6px}
  .col-h .n{font-family:"IBM Plex Mono",monospace;background:var(--surface-2);border:1px solid var(--line);border-radius:20px;padding:1px 8px;font-size:var(--fs-micro)}
  .col.drop{outline:1px dashed rgba(83,231,234,.4);outline-offset:4px;border-radius:var(--r-lg)}
  .col-body{display:flex;flex-direction:column;gap:10px;flex:1}
  .tk{position:relative;background:var(--panel-bg);border:1px solid var(--line);border-left:2px solid var(--text-muted);border-radius:var(--r-md);padding:13px 14px;cursor:pointer;transition:border-color .2s}
  .tk:hover{border-color:var(--line-hud)}
  .tk.backlog{border-left-color:var(--cyan-deep)}.tk.doing{border-left-color:var(--amber)}.tk.done{border-left-color:var(--live);opacity:.78}
  .tk-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .tk-fonte{font-size:var(--fs-micro);letter-spacing:.1em;text-transform:uppercase;padding:2px 6px;border-radius:var(--r-sm);color:var(--text-muted);background:var(--surface-3)}
  .tk-fonte.f-chat{color:var(--cyan);background:rgba(83,231,234,.1)}
  .tk-fonte.f-build{color:var(--live);background:rgba(86,200,176,.12)}
  .tk-ativar{margin-left:auto;font-family:"Space Grotesk",sans-serif;font-size:var(--fs-micro);color:var(--live);background:rgba(86,200,176,.1);border:1px solid rgba(86,200,176,.35);border-radius:6px;padding:2px 8px;cursor:pointer}
  .tk-tit{font-size:var(--fs-meta);line-height:1.4;color:var(--text-dim)}
  .tk-ag{font-family:"IBM Plex Mono",monospace;font-size:var(--fs-micro);color:var(--text-muted);margin-top:7px}
  .vazio{font-size:var(--fs-meta);color:var(--text-muted);line-height:1.6;padding:8px 2px}
  /* detalhe */
  #scrim{position:fixed;inset:0;z-index:40;background:rgba(2,4,7,.55);opacity:0;pointer-events:none;transition:opacity .3s}
  #scrim.on{opacity:1;pointer-events:auto}
  #det{position:fixed;top:0;right:0;bottom:0;width:min(520px,96vw);z-index:41;display:flex;flex-direction:column;
    background:linear-gradient(180deg,var(--surface-1),var(--void));border-left:1px solid var(--line-hud);
    box-shadow:-30px 0 70px -30px rgba(0,0,0,.9);transform:translateX(102%);transition:transform .3s cubic-bezier(.3,.8,.3,1);overflow-y:auto}
  #det.open{transform:none}
  .det-head{display:flex;align-items:center;gap:10px;padding:16px 20px 0}
  .det-status{font-size:var(--fs-micro);letter-spacing:.12em;text-transform:uppercase;padding:3px 8px;border-radius:6px;color:var(--text-muted);background:var(--surface-3)}
  .det-status.doing{color:var(--amber-glow);background:rgba(224,164,76,.12)}.det-status.done{color:var(--live);background:rgba(86,200,176,.12)}
  .det-fonte{font-size:var(--fs-micro);letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted)}
  .det-salvo{margin-left:auto;font-family:"IBM Plex Mono",monospace;font-size:var(--fs-micro);color:var(--live);opacity:0;transition:opacity .3s}.det-salvo.on{opacity:1}
  .det-x{width:30px;height:30px;border-radius:var(--r-md);border:1px solid var(--line);background:transparent;color:var(--text-muted);cursor:pointer;font-size:14px;flex-shrink:0;font-family:"Space Grotesk",sans-serif}
  .det-x:hover{color:var(--text);border-color:var(--line-hud)}
  .det-body{padding:14px 20px 24px;display:flex;flex-direction:column;gap:14px}
  .det-body input.tit{background:transparent;border:0;border-bottom:1px solid var(--line);color:var(--text);font-family:"Space Grotesk",sans-serif;font-size:var(--fs-card);font-weight:600;padding:6px 0}
  .det-body input.tit:focus{outline:none;border-color:var(--cyan)}
  .det-meta{display:flex;flex-wrap:wrap;gap:12px;font-family:"IBM Plex Mono",monospace;font-size:var(--fs-micro);color:var(--text-muted)}
  .det-l{font-size:var(--fs-micro);letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);display:block;margin-bottom:6px}
  .det-detalhe{width:100%;display:block;background:var(--surface-1);border:1px solid var(--line);border-radius:var(--r-md);color:var(--text);font-family:"Space Grotesk",sans-serif;font-size:var(--fs-meta);line-height:1.5;padding:11px 13px;resize:vertical;min-height:70px}
  .det-detalhe:focus{outline:none;border-color:var(--cyan);box-shadow:inset 0 0 16px -12px rgba(83,231,234,.6)}
  .det-acoes{display:flex;gap:9px}
  .det-lbl{font-size:var(--fs-micro);letter-spacing:.14em;text-transform:uppercase;color:var(--amber-glow);margin-bottom:6px;font-weight:600}
  #d-live:not(:empty){background:var(--surface-1);border:1px solid rgba(224,164,76,.28);border-radius:var(--r-md);padding:12px 14px}
  .ev-log{font-family:"IBM Plex Mono",monospace;font-size:var(--fs-micro);line-height:1.7;color:var(--text-muted)}
  .ev-log.tool{color:var(--cyan)}.ev-log.fim{color:var(--live)}.ev-log.erro{color:var(--error)}.ev-log.inicio{color:var(--amber-glow)}
  #d-res:not(:empty){background:var(--surface-1);border:1px solid rgba(86,200,176,.3);border-radius:var(--r-md);padding:12px 14px}
  .det-res-txt{font-size:var(--fs-meta);line-height:1.6;color:var(--text);white-space:pre-wrap;word-break:break-word}
  .det-arqs{display:flex;flex-wrap:wrap;gap:7px;margin-top:11px}
  .det-abrir{font-family:"IBM Plex Mono",monospace;font-size:var(--fs-meta);color:var(--live);background:rgba(86,200,176,.1);border:1px solid rgba(86,200,176,.32);border-radius:var(--r-md);padding:6px 11px;cursor:pointer}
  .det-abrir:hover{background:rgba(86,200,176,.18)}
  @media(max-width:820px){.board{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <h1>Tarefas<span>O que entra, o que roda, o que saiu</span></h1>
  <button class="btn" id="btn-novo">+ Nova tarefa</button>
</header>
<div id="novo">
  <div class="row">
    <input id="f-titulo" placeholder="O que você quer que o time faça?">
    <select id="f-agente"><option value="">time (qualquer um)</option></select>
    <button class="btn ghost" id="f-ideia">Salvar ideia</button>
    <button class="btn" id="f-ativar">Criar e ativar ⚒</button>
  </div>
  <textarea id="f-detalhe" placeholder="Detalhe (opcional): contexto, referências, o formato que você quer"></textarea>
</div>
<div class="board" id="board"></div>

<div id="scrim"></div>
<aside id="det">
  <div class="det-head">
    <span class="det-status" id="d-status"></span>
    <span class="det-fonte" id="d-fonte"></span>
    <span class="det-salvo" id="d-salvo">salvo ✓</span>
    <button class="det-x" id="d-close">✕</button>
  </div>
  <div class="det-body">
    <input class="tit" id="d-titulo">
    <div class="det-meta" id="d-meta"></div>
    <div><span class="det-l">Detalhe</span><textarea class="det-detalhe" id="d-detalhe"></textarea></div>
    <div class="det-acoes">
      <button class="btn" id="d-ativar">▶ Ativar (build)</button>
      <button class="btn ghost" id="d-remover">Remover</button>
    </div>
    <div id="d-live"></div>
    <div id="d-res"></div>
  </div>
</aside>

<script>
'use strict';
const $=s=>document.querySelector(s);
const esc=s=>String(s??'').replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));
const FONTE_LBL={painel:'Painel',chat:'Chat',build:'Build'},ST_LBL={backlog:'A fazer',doing:'Fazendo',done:'Feito'};
const DEMO=/[?&]demo/.test(location.search);
const MOCK_TASKS=[
  {id:'m1',titulo:'Montar o relatório de margem por loja',agente:'arquiteto-power-bi',fonte:'painel',status:'backlog',ativo:false,detalhe:'Foco nas 42 lojas, ordenar por margem',criado:'2026-07-10T09:00'},
  {id:'m2',titulo:'Alerta de ruptura de estoque no dashboard',fonte:'chat',status:'doing',ativo:true,detalhe:'',criado:'2026-07-10T09:10'},
  {id:'m3',titulo:'View de faturamento consolidado',fonte:'build',status:'done',ativo:true,resultado:'Criei a view SQL e o painel de faturamento. Arquivo em producao/faturamento.md.',saida:['producao/faturamento.md'],criado:'2026-07-10T08:40'},
];
let CARDS=[], detId=null, detPoll=null, detEncerrar=false, saveT=null;

async function carregarAgentes(){
  if(DEMO)return;
  try{const d=await (await fetch('/api/painel')).json();
    $('#f-agente').innerHTML='<option value="">time (qualquer um)</option>'+(d.agentes||[]).map(a=>`<option value="${esc(a.slug)}">${esc(a.nome)}</option>`).join('');}catch(e){}
}
async function carregar(){
  if(DEMO){CARDS=MOCK_TASKS;render();return;}
  try{CARDS=(await (await fetch('/api/tasks')).json()).tasks||[];}catch(e){CARDS=[];}
  render();
}
function render(){
  const cols={backlog:[],doing:[],done:[]};
  CARDS.forEach(c=>{(cols[c.status]||cols.backlog).push(c);});
  $('#board').innerHTML=['backlog','doing','done'].map(st=>`
    <div class="col" data-st="${st}">
      <div class="col-h">${ST_LBL[st]} <span class="n">${cols[st].length}</span></div>
      <div class="col-body" data-st="${st}">${cols[st].map(cardHTML).join('')||'<div class="vazio">'+(st==='backlog'?'Nenhuma ideia ainda. Crie uma ou peça algo pro time no chat.':'')+'</div>'}</div>
    </div>`).join('');
  wire();
}
function cardHTML(c){
  const idea=c.status==='backlog'&&!c.ativo;
  return `<div class="tk ${c.status}" draggable="true" data-id="${esc(c.id)}">
    <div class="tk-top"><span class="tk-fonte f-${esc(c.fonte||'painel')}">${esc(FONTE_LBL[c.fonte]||c.fonte||'painel')}</span>
      ${idea?`<span class="tk-ativar" data-ativar="${esc(c.id)}">▶ ativar</span>`:''}</div>
    <div class="tk-tit">${esc(c.titulo)}</div>
    ${c.agente?`<div class="tk-ag">◆ ${esc(c.agente)}</div>`:''}</div>`;
}
function wire(){
  document.querySelectorAll('.tk').forEach(el=>{
    el.onclick=e=>{if(e.target.closest('[data-ativar]'))return;abrirDet(el.dataset.id);};
    el.ondragstart=e=>{e.dataTransfer.setData('id',el.dataset.id);};
  });
  document.querySelectorAll('[data-ativar]').forEach(el=>el.onclick=async e=>{
    e.stopPropagation();try{await fetch('/api/tasks/'+el.dataset.ativar+'/ativar',{method:'POST'});}catch(err){}setTimeout(carregar,500);});
  document.querySelectorAll('.col-body').forEach(col=>{
    col.ondragover=e=>{e.preventDefault();col.parentElement.classList.add('drop');};
    col.ondragleave=()=>col.parentElement.classList.remove('drop');
    col.ondrop=async e=>{e.preventDefault();col.parentElement.classList.remove('drop');
      const id=e.dataTransfer.getData('id'),st=col.dataset.st;
      try{await fetch('/api/tasks/'+id,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:st})});}catch(err){}
      setTimeout(carregar,300);};
  });
}
// novo
$('#btn-novo').onclick=()=>{$('#novo').classList.toggle('open');if($('#novo').classList.contains('open'))$('#f-titulo').focus();};
async function criar(ativar){
  const titulo=$('#f-titulo').value.trim();if(!titulo)return;
  const body={titulo,agente:$('#f-agente').value,detalhe:$('#f-detalhe').value.trim(),fonte:'painel',status:'backlog',ativo:!ativar};
  try{const r=await (await fetch('/api/tasks',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})).json();
    if(ativar&&r.id)await fetch('/api/tasks/'+r.id+'/ativar',{method:'POST'});}catch(e){}
  $('#f-titulo').value='';$('#f-detalhe').value='';$('#novo').classList.remove('open');setTimeout(carregar,300);
}
$('#f-ideia').onclick=()=>criar(false);$('#f-ativar').onclick=()=>criar(true);

// detalhe
function abrirDet(id){
  const c=CARDS.find(x=>x.id===id);if(!c)return;detId=id;
  $('#d-status').textContent=ST_LBL[c.status]||c.status;$('#d-status').className='det-status '+c.status;
  $('#d-fonte').textContent=(FONTE_LBL[c.fonte]||c.fonte||'painel');
  $('#d-titulo').value=c.titulo||'';$('#d-detalhe').value=c.detalhe||'';
  $('#d-meta').innerHTML=`<span>◆ ${esc(c.agente||'time')}</span><span>criado ${esc((c.criado||'').replace('T',' ').slice(0,16))}</span>`;
  $('#d-live').innerHTML='';$('#d-res').innerHTML='';
  $('#scrim').classList.add('on');$('#det').classList.add('open');
  clearInterval(detPoll);pollDet();detPoll=setInterval(pollDet,2500);
}
function fecharDet(){detId=null;clearInterval(detPoll);$('#scrim').classList.remove('on');$('#det').classList.remove('open');}
$('#d-close').onclick=fecharDet;$('#scrim').onclick=fecharDet;
async function pollDet(){
  if(!detId)return;const c=CARDS.find(x=>x.id===detId);if(!c)return;let rodando=false;
  try{const b=await (await fetch('/api/build')).json();
    if(b.ativo&&b.origem&&b.origem===c.origem){rodando=true;
      const ic={inicio:'▶',tool:'▸',texto:'·',fim:'✔',erro:'✖'},min=Math.floor((b.segundos||0)/60),sg=(b.segundos||0)%60;
      $('#d-live').innerHTML=`<div class="det-lbl">⚡ rodando ao vivo · ${min}m${String(sg).padStart(2,'0')}s</div>`+
        (b.eventos||[]).slice(-14).map(e=>`<div class="ev-log ${esc(e.tipo)}">${ic[e.tipo]||'·'} ${esc(e.detalhe)}</div>`).join('');
    }else $('#d-live').innerHTML='';
  }catch(e){}
  detEncerrar=rodando;const btn=$('#d-ativar');
  if(!btn.disabled){if(rodando){btn.innerHTML='■ Encerrar';btn.classList.add('danger');}
    else{btn.innerHTML=(c.status==='done'?'▶ Rodar de novo':'▶ Ativar (build)');btn.classList.remove('danger');}}
  if(c.resultado){const arqs=(c.saida||[]).map(p=>`<button class="det-abrir" data-abrir="${esc(p)}">📄 ${esc(p.split('/').pop()||p)}</button>`).join('');
    $('#d-res').innerHTML=`<div class="det-lbl" style="color:var(--live)">✔ resultado</div><div class="det-res-txt">${esc(c.resultado)}</div>`+(arqs?`<div class="det-arqs">${arqs}</div>`:'');
  }else $('#d-res').innerHTML='';
}
$('#d-ativar').onclick=async()=>{
  if(!detId)return;const btn=$('#d-ativar');
  if(detEncerrar){btn.disabled=true;btn.textContent='...';setTimeout(()=>{btn.disabled=false;carregar();pollDet();},800);return;}
  btn.disabled=true;btn.textContent='disparando...';
  try{await fetch('/api/tasks/'+detId+'/ativar',{method:'POST'});}catch(e){}
  setTimeout(()=>{btn.disabled=false;carregar();pollDet();},900);
};
$('#d-remover').onclick=async()=>{if(!detId||!confirm('Remover esta tarefa?'))return;try{await fetch('/api/tasks/'+detId,{method:'DELETE'});}catch(e){}fecharDet();carregar();};
function autoSave(){if(!detId)return;clearTimeout(saveT);saveT=setTimeout(async()=>{
  const t=$('#d-titulo').value.trim();if(!t)return;
  try{await fetch('/api/tasks/'+detId,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({titulo:t,detalhe:$('#d-detalhe').value})});
    const c=CARDS.find(x=>x.id===detId);if(c){c.titulo=t;c.detalhe=$('#d-detalhe').value;}
    const s=$('#d-salvo');s.classList.add('on');clearTimeout(s._t);s._t=setTimeout(()=>s.classList.remove('on'),1500);}catch(e){}
},700);}
$('#d-titulo').addEventListener('input',autoSave);$('#d-detalhe').addEventListener('input',autoSave);
$('#d-res').addEventListener('click',async e=>{const b=e.target.closest('[data-abrir]');if(!b)return;
  b.disabled=true;const o=b.textContent;b.textContent='abrindo...';
  try{await fetch('/api/abrir',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path:b.dataset.abrir})});}catch(e){}
  setTimeout(()=>{b.disabled=false;b.textContent=o;},900);});

carregarAgentes();carregar();setInterval(()=>{if(!detId)carregar();},6000);
</script>
</body>
</html>
