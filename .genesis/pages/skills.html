<!DOCTYPE html>
<!-- DS: Control Room (../../agentic-os/docs/design-system-control-room.md) · JARVIS elegante.
     View "Skills" do shell: catálogo das skills do OS (.claude/skills/) + editor do SKILL.md.
     Lista as skills sob medida, com a /extrair-design-system marcada como obrigatória.
     Preview antes de Editar. Lê /api/skills e /api/skill/<slug>. -->
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>Skills · Meu OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#0A0D12; --surface-1:#10151C; --surface-2:#161C25; --surface-3:#1D2530;
    --line:#212934; --line-hud:rgba(83,231,234,.20);
    --text:#E6ECF2; --text-dim:#93A0AD; --text-muted:#58646F;
    --cyan:#53E7EA; --cyan-deep:#1C6E77;
    --amber:#E0A44C; --amber-glow:#F5C97A;
    --live:#56C8B0; --warn:#E0A44C; --error:#D2685E;
    --panel-bg:linear-gradient(180deg,rgba(22,28,37,.7),rgba(16,21,28,.7));
    --panel-glow:inset 0 0 30px -20px rgba(83,231,234,.4),0 8px 24px -14px rgba(0,0,0,.6);
    --r-sm:4px; --r-md:8px; --r-lg:12px;
    --fs-micro:10px; --fs-meta:12px; --fs-body:14px; --fs-emph:15px; --fs-card:17px; --fs-title:20px; --fs-detail:24px; --fs-hero:34px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  *{scrollbar-width:thin;scrollbar-color:var(--surface-3) transparent}
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:5px}
  ::-webkit-scrollbar-thumb:hover{background:#2b3542}
  html,body{height:100%;overflow:hidden}
  body{background:var(--void);color:var(--text);font-family:"Space Grotesk",system-ui,sans-serif;
    font-size:var(--fs-body);line-height:1.5;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;height:100vh}
  a{color:var(--cyan)}
  header{display:flex;align-items:center;justify-content:space-between;padding:15px 24px;border-bottom:1px solid var(--line);flex:0 0 auto}
  header h1{font-size:var(--fs-title);font-weight:600}header h1 span{font-size:var(--fs-micro);letter-spacing:.22em;color:var(--text-muted);display:block;margin-top:3px;text-transform:uppercase}
  #cnt{font-family:"IBM Plex Mono",monospace;font-size:var(--fs-meta);color:var(--text-muted)}
  .wrap{flex:1 1 auto;display:grid;grid-template-columns:320px 1fr;overflow:hidden}
  .lista{border-right:1px solid var(--line);overflow-y:auto;padding:14px 12px;display:flex;flex-direction:column;gap:8px}
  .sk{position:relative;background:var(--panel-bg);border:1px solid var(--line);border-radius:var(--r-md);padding:13px 14px;cursor:pointer;transition:all .2s}
  .sk:hover{border-color:var(--line-hud)}
  .sk.sel{border-color:rgba(83,231,234,.4);background:rgba(83,231,234,.05);box-shadow:inset 0 0 26px -18px rgba(83,231,234,.6)}
  .sk-top{display:flex;align-items:center;gap:11px}
  .sk-ico{width:36px;height:36px;border-radius:var(--r-md);display:grid;place-items:center;font-size:16px;flex-shrink:0;background:var(--surface-1);border:1px solid var(--line)}
  .sk-id{flex:1;min-width:0}
  .sk-cmd{font-family:"IBM Plex Mono",monospace;font-size:var(--fs-meta);font-weight:500;color:var(--cyan);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sk-nome{font-size:var(--fs-micro);color:var(--text-muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.02em}
  .sk-desc{font-size:var(--fs-meta);color:var(--text-dim);line-height:1.45;margin-top:9px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .sk-badge{font-size:var(--fs-micro);letter-spacing:.12em;text-transform:uppercase;color:var(--amber-glow);background:rgba(224,164,76,.12);border:1px solid rgba(224,164,76,.3);border-radius:var(--r-sm);padding:2px 6px;margin-left:auto;flex-shrink:0}
  .painel{overflow:hidden;display:flex;flex-direction:column}
  .fhead{display:flex;align-items:center;gap:14px;padding:14px 24px;border-bottom:1px solid var(--line);flex:0 0 auto}
  .fhead .fnome{flex:1;min-width:0;font-family:"IBM Plex Mono",monospace;font-size:var(--fs-emph);font-weight:500;color:var(--cyan);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .toggle{display:flex;background:var(--surface-1);border:1px solid var(--line);border-radius:var(--r-md);padding:3px}
  .toggle button{font-family:"Space Grotesk",sans-serif;font-size:var(--fs-meta);color:var(--text-dim);background:transparent;border:0;border-radius:6px;padding:6px 13px;cursor:pointer;transition:all .2s}
  .toggle button.on{color:var(--text);background:rgba(83,231,234,.12)}
  .salvar{font-family:"Space Grotesk",sans-serif;border:1px solid var(--cyan);border-radius:var(--r-md);padding:8px 15px;cursor:pointer;font-size:var(--fs-meta);font-weight:600;
    background:var(--surface-2);color:var(--text);box-shadow:0 0 18px -8px rgba(83,231,234,.5),inset 0 0 12px -8px rgba(83,231,234,.4);transition:all .2s}
  .salvar:hover{box-shadow:0 0 22px -6px rgba(83,231,234,.7),inset 0 0 14px -6px rgba(83,231,234,.5)}
  .salvar:disabled{opacity:.5;cursor:default;box-shadow:none}
  .salvo{font-family:"IBM Plex Mono",monospace;font-size:var(--fs-micro);color:var(--live);opacity:0;transition:opacity .3s}.salvo.on{opacity:1}
  .fbody{flex:1 1 auto;overflow-y:auto;padding:24px 30px}
  .fvazio{margin:auto;text-align:center;color:var(--text-muted);font-size:var(--fs-body);line-height:1.7;padding-top:16vh}
  .fvazio .em{font-size:32px;display:block;margin-bottom:12px;opacity:.6;color:var(--cyan-deep)}
  textarea#ed{width:100%;height:100%;min-height:60vh;resize:none;background:var(--surface-1);border:1px solid var(--line);border-radius:var(--r-md);
    color:var(--text);font-family:"IBM Plex Mono",monospace;font-size:var(--fs-meta);line-height:1.7;padding:16px 18px}
  textarea#ed:focus{outline:none;border-color:var(--cyan);box-shadow:inset 0 0 18px -12px rgba(83,231,234,.6)}
  .md{max-width:760px;font-size:var(--fs-body);line-height:1.7;color:var(--text-dim)}
  .md h1{font-size:var(--fs-detail);font-weight:600;margin:4px 0 14px;color:var(--text)}
  .md h2{font-size:var(--fs-card);font-weight:600;margin:22px 0 10px;color:var(--text)}
  .md h3{font-size:var(--fs-emph);font-weight:600;margin:18px 0 8px;color:var(--text)}
  .md p{margin:10px 0}.md ul{margin:10px 0 10px 22px}.md li{margin:5px 0}
  .md code{font-family:"IBM Plex Mono",monospace;font-size:var(--fs-meta);background:rgba(83,231,234,.1);border:1px solid rgba(83,231,234,.2);border-radius:var(--r-sm);padding:1px 6px;color:var(--cyan)}
  .md hr{border:0;border-top:1px solid var(--line);margin:20px 0}.md b{color:var(--text)}
  @media(max-width:820px){.wrap{grid-template-columns:1fr}.lista{display:none}}
</style>
</head>
<body>
<header><h1>Skills<span>As automações sob medida do seu OS</span></h1><div id="cnt"></div></header>
<div class="wrap">
  <div class="lista" id="lista"></div>
  <div class="painel">
    <div class="fhead" id="fhead" style="display:none">
      <div class="fnome" id="fnome">—</div>
      <span class="salvo" id="salvo">salvo ✓</span>
      <div class="toggle" id="toggle"><button data-m="preview" class="on">Preview</button><button data-m="edit">Editar</button></div>
      <button class="salvar" id="salvar" style="display:none">Salvar</button>
    </div>
    <div class="fbody" id="fbody"><div class="fvazio"><span class="em">◇</span>Escolha uma skill pra ver o que ela faz ou editar.<br>Cada skill é uma automação que o seu Claude Code executa de verdade.</div></div>
  </div>
</div>
<script>
'use strict';
const $=s=>document.querySelector(s);
const esc=s=>String(s??'').replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));
let skills=[], atual=null;
const DEMO=/[?&]demo/.test(location.search);
const MOCK_SK=[
  {slug:'nova-view',nome:'Nova view',ic:'⚡',cmd:'/nova-view',desc:'Gera a view SQL a partir da necessidade do dashboard.'},
  {slug:'modelo-financeiro',nome:'Modelo financeiro',ic:'📊',cmd:'/modelo-financeiro',desc:'Monta o modelo estrela do financeiro no Power BI.'},
  {slug:'extrair-design-system',nome:'Extrair design system',ic:'🎨',cmd:'/extrair-design-system',desc:'Extrai o design system de uma referência e gera o DS do seu OS.',obrigatoria:true},
  {slug:'site-reveal-cinematico',nome:'Site com Reveal Cinematográfico',ic:'🎬',cmd:'/site-reveal-cinematico',desc:'Cria um site scroll-driven com reveal cinematográfico (estilo Apple). Ótimo pra portfólio: mostrar seus dashboards num site premium.',bonus:true},
];
const MOCK_SKC={
  'nova-view':'---\nname: nova-view\n---\n\n# Nova view\n\nGera a view SQL a partir da necessidade do dashboard.\n\n## Processo\n1. Entende a métrica pedida\n2. Desenha a view mínima\n3. Valida performance e documenta\n',
  'modelo-financeiro':'---\nname: modelo-financeiro\n---\n\n# Modelo financeiro\n\nMonta o modelo estrela (fato + dimensões) do financeiro no Power BI, com medidas DAX limpas.\n',
  'extrair-design-system':'---\nname: extrair-design-system\n---\n\n# Extrair design system\n\nExtrai o design system de uma referência (HTML, URL, print) e gera o DS do seu OS.\n',
};

function mdToHtml(md){
  let h=esc(md);
  h=h.replace(/^### (.*)$/gm,'<h3>$1</h3>').replace(/^## (.*)$/gm,'<h2>$1</h2>').replace(/^# (.*)$/gm,'<h1>$1</h1>');
  h=h.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  h=h.replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>');
  h=h.replace(/`([^`]+)`/g,'<code>$1</code>');
  h=h.replace(/^\s*[-*] (.*)$/gm,'<li>$1</li>');
  h=h.replace(/(?:<li>.*<\/li>\s*)+/g,m=>'<ul>'+m+'</ul>');
  h=h.replace(/^---+$/gm,'<hr>');
  return h.split(/\n{2,}/).map(b=>{b=b.trim();return /^<(h\d|ul|hr|p|pre)/.test(b)?b:(b?'<p>'+b.replace(/\n/g,'<br>')+'</p>':'');}).join('\n');
}
function renderLista(){
  $('#cnt').textContent=skills.length+' skills';
  $('#lista').innerHTML=skills.map(s=>`
    <div class="sk ${atual&&atual.slug===s.slug?'sel':''}" data-slug="${esc(s.slug)}">
      <div class="sk-top"><div class="sk-ico">${esc(s.ic||'⚡')}</div>
        <div class="sk-id"><div class="sk-cmd">${esc(s.cmd||('/'+s.slug))}</div><div class="sk-nome">${esc(s.nome||s.slug)}</div></div>
        ${s.obrigatoria?'<span class="sk-badge">obrig.</span>':''}${s.bonus?'<span class="sk-badge">bônus</span>':''}</div>
      <div class="sk-desc">${esc((s.desc||'').slice(0,140)||'Automação sob medida do seu OS.')}</div>
    </div>`).join('')||'<div class="fvazio" style="padding-top:8vh"><span class="em">◇</span>Sem skills ainda. Elas nascem quando você monta o time.</div>';
  document.querySelectorAll('.sk').forEach(el=>el.onclick=()=>abrir(el.dataset.slug));
}
async function abrir(slug){
  const s=skills.find(x=>x.slug===slug); if(!s)return; atual=s; renderLista();
  s.ic=s.ic||'⚡';
  $('#fhead').style.display='flex'; $('#fnome').textContent=s.cmd||('/'+s.slug);
  if(DEMO){atual._c=MOCK_SKC[slug]||('# '+s.nome+'\n\n(conteúdo de demo)');setModo('preview');return;}
  try{const r=await fetch('/api/skill/'+encodeURIComponent(slug));atual._c=(await r.json()).conteudo||'';}
  catch(e){atual._c='(não consegui ler)';}
  setModo('preview');
}
function setModo(m){
  const edit=(m==='edit');
  $('#salvar').style.display=edit?'inline-block':'none';
  document.querySelectorAll('#toggle button').forEach(b=>b.classList.toggle('on',b.dataset.m===m));
  const body=$('#fbody');
  if(edit){body.innerHTML=`<textarea id="ed" spellcheck="false"></textarea>`;$('#ed').value=atual._c||'';}
  else body.innerHTML=`<div class="md">${mdToHtml((atual._c||'').replace(/^---\s*\n[\s\S]*?\n---\s*\n/,''))}</div>`;
}
document.querySelectorAll('#toggle button').forEach(b=>b.onclick=()=>setModo(b.dataset.m));
$('#salvar').onclick=async()=>{
  if(!atual)return; const btn=$('#salvar'); btn.disabled=true; atual._c=$('#ed').value;
  try{await fetch('/api/skill/'+encodeURIComponent(atual.slug),{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({conteudo:atual._c})});
    const s=$('#salvo');s.classList.add('on');clearTimeout(s._t);s._t=setTimeout(()=>s.classList.remove('on'),1600);}
  catch(e){}
  setTimeout(()=>btn.disabled=false,300);
};
async function carregar(){if(DEMO){skills=MOCK_SK;renderLista();return;}try{const r=await fetch('/api/skills');skills=(await r.json()).skills||[];renderLista();}catch(e){}}
carregar();
</script>
</body>
</html>
