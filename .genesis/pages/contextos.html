<!DOCTYPE html>
<!-- DS: Control Room (../../agentic-os/docs/design-system-control-room.md) · JARVIS elegante.
     View "Contexto" do shell: o knowledge vault do OS. Navega e edita os .md do contexto/
     (perfil, fonte, e a árvore de referencia/), e deixa o comprador PUXAR o site da empresa
     (o Claude Code lê a URL e escreve o brief em referencia/). Preview antes de Editar. -->
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>Contexto · Meu OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#0A0D12; --surface-1:#10151C; --surface-2:#161C25; --surface-3:#1D2530;
    --line:#212934; --line-hud:rgba(83,231,234,.20);
    --text:#E6ECF2; --text-dim:#93A0AD; --text-muted:#58646F;
    --cyan:#53E7EA; --cyan-deep:#1C6E77;
    --amber:#E0A44C; --amber-glow:#F5C97A;
    --live:#56C8B0; --warn:#E0A44C; --error:#D2685E;
    --panel-bg:linear-gradient(180deg,rgba(22,28,37,.7),rgba(16,21,28,.7));
    --panel-glow:inset 0 0 30px -20px rgba(83,231,234,.4),0 8px 24px -14px rgba(0,0,0,.6);
    --r-sm:4px; --r-md:8px; --r-lg:12px;
    --fs-micro:10px; --fs-meta:12px; --fs-body:14px; --fs-emph:15px; --fs-card:17px; --fs-title:20px; --fs-detail:24px; --fs-hero:34px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  *{scrollbar-width:thin;scrollbar-color:var(--surface-3) transparent}
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:5px}
  ::-webkit-scrollbar-thumb:hover{background:#2b3542}
  html,body{height:100%;overflow:hidden}
  body{background:var(--void);color:var(--text);font-family:"Space Grotesk",system-ui,sans-serif;
    font-size:var(--fs-body);line-height:1.5;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;height:100vh}
  a{color:var(--cyan)}
  header{display:flex;align-items:center;justify-content:space-between;padding:15px 24px;border-bottom:1px solid var(--line);flex:0 0 auto}
  header h1{font-size:var(--fs-title);font-weight:600}header h1 span{font-size:var(--fs-micro);letter-spacing:.22em;color:var(--text-muted);display:block;margin-top:3px;text-transform:uppercase}
  #cnt{font-family:"IBM Plex Mono",monospace;font-size:var(--fs-meta);color:var(--text-muted)}
  .wrap{flex:1 1 auto;display:grid;grid-template-columns:288px 1fr;overflow:hidden}
  /* lista */
  .lista{border-right:1px solid var(--line);overflow-y:auto;padding:16px 12px;display:flex;flex-direction:column;gap:4px}
  .puxar{position:relative;background:linear-gradient(180deg,rgba(83,231,234,.05),rgba(16,21,28,.72));border:1px solid var(--line-hud);border-radius:var(--r-lg);padding:13px;margin-bottom:12px}
  .puxar .pt{font-size:var(--fs-micro);letter-spacing:.14em;color:var(--cyan);text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:7px;font-weight:500}
  .puxar p{font-size:var(--fs-micro);color:var(--text-muted);line-height:1.5;margin-bottom:9px}
  .puxar input{width:100%;background:var(--surface-1);border:1px solid var(--line);border-radius:var(--r-md);color:var(--text);font-family:"Space Grotesk",sans-serif;font-size:var(--fs-meta);padding:9px 11px}
  .puxar input:focus{outline:none;border-color:var(--cyan);box-shadow:inset 0 0 16px -12px rgba(83,231,234,.6)}
  .puxar button{width:100%;margin-top:8px;font-family:"Space Grotesk",sans-serif;border:1px solid var(--cyan);border-radius:var(--r-md);padding:9px;cursor:pointer;font-size:var(--fs-meta);font-weight:600;
    background:var(--surface-2);color:var(--text);box-shadow:0 0 18px -8px rgba(83,231,234,.5),inset 0 0 12px -8px rgba(83,231,234,.4);transition:all .2s}
  .puxar button:hover{box-shadow:0 0 22px -6px rgba(83,231,234,.7),inset 0 0 14px -6px rgba(83,231,234,.5)}
  .puxar button:disabled{opacity:.5;cursor:default;box-shadow:none}
  .puxar .st{font-family:"IBM Plex Mono",monospace;font-size:var(--fs-micro);color:var(--text-muted);margin-top:8px;line-height:1.4;min-height:0}
  .puxar .st.ok{color:var(--live)}.puxar .st.err{color:var(--error)}
  .grupo{font-size:var(--fs-micro);letter-spacing:.18em;color:var(--text-muted);text-transform:uppercase;margin:12px 8px 4px}
  .fpasta{font-size:var(--fs-meta);color:var(--text-muted);padding:7px 8px;border-radius:var(--r-md);cursor:pointer;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .fpasta:hover{color:var(--text);background:var(--surface-2)}
  .fitem{display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:var(--r-md);border:1px solid transparent;cursor:pointer;transition:all .2s;position:relative}
  .fitem:hover{background:var(--surface-2)}
  .fitem.sel{background:linear-gradient(90deg,rgba(83,231,234,.08),transparent 70%)}
  .fitem.sel::before{content:"";position:absolute;left:0;top:6px;bottom:6px;width:2px;border-radius:0 2px 2px 0;background:var(--cyan);box-shadow:0 0 10px -1px rgba(83,231,234,.75)}
  .fitem .fn{flex:1;min-width:0;font-size:var(--fs-body);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .fitem .fk{font-family:"IBM Plex Mono",monospace;font-size:var(--fs-micro);color:var(--text-muted);flex-shrink:0}
  .fitem .lock{font-size:var(--fs-meta);color:var(--text-muted);opacity:.6}
  /* painel do arquivo */
  .painel{overflow:hidden;display:flex;flex-direction:column}
  .fhead{display:flex;align-items:center;gap:14px;padding:14px 24px;border-bottom:1px solid var(--line);flex:0 0 auto}
  .fhead .fnome{flex:1;min-width:0;font-size:var(--fs-emph);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .toggle{display:flex;background:var(--surface-1);border:1px solid var(--line);border-radius:var(--r-md);padding:3px}
  .toggle button{font-family:"Space Grotesk",sans-serif;font-size:var(--fs-meta);color:var(--text-dim);background:transparent;border:0;border-radius:6px;padding:6px 13px;cursor:pointer;transition:all .2s}
  .toggle button.on{color:var(--text);background:rgba(83,231,234,.12)}
  .salvar{font-family:"Space Grotesk",sans-serif;border:1px solid var(--cyan);border-radius:var(--r-md);padding:8px 15px;cursor:pointer;font-size:var(--fs-meta);font-weight:600;
    background:var(--surface-2);color:var(--text);box-shadow:0 0 18px -8px rgba(83,231,234,.5),inset 0 0 12px -8px rgba(83,231,234,.4);transition:all .2s}
  .salvar:hover{box-shadow:0 0 22px -6px rgba(83,231,234,.7),inset 0 0 14px -6px rgba(83,231,234,.5)}
  .salvar:disabled{opacity:.5;cursor:default;box-shadow:none}
  .salvo{font-family:"IBM Plex Mono",monospace;font-size:var(--fs-micro);color:var(--live);opacity:0;transition:opacity .3s}.salvo.on{opacity:1}
  .fbody{flex:1 1 auto;overflow-y:auto;padding:24px 30px}
  .fvazio{margin:auto;text-align:center;color:var(--text-muted);font-size:var(--fs-body);line-height:1.7;padding-top:16vh}
  .fvazio .em{font-size:32px;display:block;margin-bottom:12px;opacity:.6;color:var(--cyan-deep)}
  textarea#ed{width:100%;height:100%;min-height:60vh;resize:none;background:var(--surface-1);border:1px solid var(--line);border-radius:var(--r-md);
    color:var(--text);font-family:"IBM Plex Mono",monospace;font-size:var(--fs-meta);line-height:1.7;padding:16px 18px}
  textarea#ed:focus{outline:none;border-color:var(--cyan);box-shadow:inset 0 0 18px -12px rgba(83,231,234,.6)}
  /* markdown render */
  .md{max-width:760px;font-size:var(--fs-body);line-height:1.7;color:var(--text-dim)}
  .md h1{font-size:var(--fs-detail);font-weight:600;margin:4px 0 14px;color:var(--text)}
  .md h2{font-size:var(--fs-card);font-weight:600;margin:22px 0 10px;color:var(--text)}
  .md h3{font-size:var(--fs-emph);font-weight:600;margin:18px 0 8px;color:var(--text)}
  .md p{margin:10px 0}.md ul{margin:10px 0 10px 22px}.md li{margin:5px 0}
  .md code{font-family:"IBM Plex Mono",monospace;font-size:var(--fs-meta);background:rgba(83,231,234,.1);border:1px solid rgba(83,231,234,.2);border-radius:var(--r-sm);padding:1px 6px;color:var(--cyan)}
  .md hr{border:0;border-top:1px solid var(--line);margin:20px 0}
  .md b{color:var(--text)}
  @media(max-width:820px){.wrap{grid-template-columns:1fr}.lista{display:none}}
</style>
</head>
<body>
<header><h1>Contexto<span>Knowledge vault do seu OS</span></h1><div id="cnt"></div></header>
<div class="wrap">
  <div class="lista" id="lista">
    <div class="puxar">
      <div class="pt">⬇ Puxar do site</div>
      <p>Cola o link da sua empresa. O seu Claude Code lê o site e escreve um resumo do negócio aqui, na sua assinatura.</p>
      <input id="url" placeholder="suaempresa.com.br" autocomplete="off">
      <button id="btn-puxar">Ler o site →</button>
      <div class="st" id="puxar-st"></div>
    </div>
    <div id="arquivos"></div>
  </div>
  <div class="painel">
    <div class="fhead" id="fhead" style="display:none">
      <div class="fnome" id="fnome">—</div>
      <span class="salvo" id="salvo">salvo ✓</span>
      <div class="toggle" id="toggle"><button data-m="preview" class="on">Preview</button><button data-m="edit">Editar</button></div>
      <button class="salvar" id="salvar" style="display:none">Salvar</button>
    </div>
    <div class="fbody" id="fbody"><div class="fvazio"><span class="em">◫</span>Escolha um arquivo do contexto pra ver ou editar.<br>Ou puxe o site da sua empresa pra o time nascer sabendo do negócio.</div></div>
  </div>
</div>
<script>
'use strict';
const $=s=>document.querySelector(s);
const esc=s=>String(s??'').replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));
let arquivos=[], atual=null, modo='preview';
const DEMO=false; // modo demo é só do dev, removido do build do aluno
const MOCK_CTX=[
  {rel:'CLAUDE.md',nome:'CLAUDE.md',pasta:'',kb:0.2,editavel:true},
  {rel:'contexto/perfil.md',nome:'perfil.md',pasta:'contexto',kb:0.1,editavel:true},
  {rel:'contexto/fonte.md',nome:'fonte.md',pasta:'contexto',kb:0.1,editavel:true},
  {rel:'contexto/referencia/negocio.md',nome:'negocio.md',pasta:'contexto/referencia',kb:0.4,editavel:true},
];
const MOCK_CONT={
  'CLAUDE.md':'# Meu OS\n\nSistema operacional pessoal montado pelo Genesis. Analista de dados, dashboards Power BI.\n\n## Meu time\n- arquiteto-power-bi, desbloqueador-de-dados, tradutor-de-negocio, design-system\n',
  'contexto/perfil.md':'# Quem sou eu\n\n- Analista de dados numa empresa média\n- Monta dashboards em Power BI\n- Trava na fila da engenharia pra liberar dado\n',
  'contexto/fonte.md':'# Minha fonte de dados\n\n**Banco SQL da empresa** (42 lojas, Oracle).\n',
  'contexto/referencia/negocio.md':'# O negócio\n\nRede de farmácias, 42 lojas no interior de SP. Faturamento anual ~R$ 180 milhões. O dashboard financeiro cobra margem por loja, ruptura de estoque e ticket médio.\n',
};

function mdToHtml(md){
  let h=esc(md);
  h=h.replace(/^### (.*)$/gm,'<h3>$1</h3>').replace(/^## (.*)$/gm,'<h2>$1</h2>').replace(/^# (.*)$/gm,'<h1>$1</h1>');
  h=h.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  h=h.replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>').replace(/(^|[^*])\*([^*]+)\*/g,'$1<i>$2</i>');
  h=h.replace(/`([^`]+)`/g,'<code>$1</code>');
  h=h.replace(/^\s*[-*] (.*)$/gm,'<li>$1</li>');
  h=h.replace(/(<li>[\s\S]*?<\/li>)(?![\s\S]*<li>)/,m=>m); // no-op guard
  h=h.replace(/(?:<li>.*<\/li>\s*)+/g,m=>'<ul>'+m+'</ul>');
  h=h.replace(/^---+$/gm,'<hr>');
  return h.split(/\n{2,}/).map(b=>{b=b.trim();return /^<(h\d|ul|hr|p|pre|blockquote)/.test(b)?b:(b?'<p>'+b.replace(/\n/g,'<br>')+'</p>':'');}).join('\n');
}

// árvore: CLAUDE.md raiz no topo, pastas auto-expandidas (só _archive colapsa)
function construirArvore(arqs){
  const raiz={pastas:{},arquivos:[]};
  arqs.forEach(a=>{const partes=a.rel.split('/');let no=raiz;
    for(let i=0;i<partes.length-1;i++){const p=partes[i];no.pastas[p]=no.pastas[p]||{pastas:{},arquivos:[]};no=no.pastas[p];}
    no.arquivos.push(a);});
  return raiz;
}
const abertos=new Set(); let treeInit=false;
function autoAbrir(no,caminho){Object.keys(no.pastas).forEach(nome=>{const c=caminho?caminho+'/'+nome:nome;
  if(nome!=='_archive')abertos.add(c);autoAbrir(no.pastas[nome],c);});}
function renderNo(no,caminho,nivel){
  let h=''; const pad=nivel*13+9;
  no.arquivos.slice().sort((a,b)=>{
    if(nivel===0){if(a.nome==='CLAUDE.md')return -1;if(b.nome==='CLAUDE.md')return 1;}
    return a.nome.localeCompare(b.nome);
  }).forEach(a=>{h+=`<div class="fitem ${atual&&atual.rel===a.rel?'sel':''}" data-rel="${esc(a.rel)}" style="padding-left:${pad}px">
    <span class="fn">${esc(a.nome)}</span>${a.editavel?'':'<span class="lock" title="só leitura">🔒</span>'}<span class="fk">${a.kb}kb</span></div>`;});
  Object.keys(no.pastas).sort().forEach(nome=>{const c=caminho?caminho+'/'+nome:nome,ab=abertos.has(c);
    h+=`<div class="fpasta" data-p="${esc(c)}" style="padding-left:${pad}px">${ab?'▾':'▸'} ${esc(nome)}/</div>`;
    if(ab)h+=renderNo(no.pastas[nome],c,nivel+1);});
  return h;
}
function renderLista(){
  $('#cnt').textContent=arquivos.length+' arquivos';
  const raiz=construirArvore(arquivos);
  if(!treeInit){autoAbrir(raiz,'');treeInit=true;}
  $('#arquivos').innerHTML=renderNo(raiz,'',0);
  document.querySelectorAll('.fitem').forEach(el=>el.onclick=()=>abrir(el.dataset.rel));
  document.querySelectorAll('.fpasta').forEach(el=>el.onclick=()=>{const p=el.dataset.p;abertos.has(p)?abertos.delete(p):abertos.add(p);renderLista();});
}
async function abrir(rel){
  const a=arquivos.find(x=>x.rel===rel); if(!a)return; atual=a;
  renderLista();
  $('#fhead').style.display='flex'; $('#fnome').textContent=a.nome;
  if(DEMO){atual._c=MOCK_CONT[rel]||'(conteúdo de demo)';setModo(a.editavel?'preview':'edit-lock');return;}
  try{const r=await fetch('/api/contexto/'+a.rel.split('/').map(encodeURIComponent).join('/'));const j=await r.json();atual._c=j.conteudo||'';}
  catch(e){atual._c='(não consegui ler)';}
  // .md abre em preview; não-editável (csv/txt) sempre preview
  setModo(a.editavel?'preview':'edit-lock');
}
function setModo(m){
  modo=m;
  const ed=a=>a, edit=(m==='edit'), lock=(m==='edit-lock');
  $('#toggle').style.display=atual&&atual.editavel?'flex':'none';
  $('#salvar').style.display=edit?'inline-block':'none';
  document.querySelectorAll('#toggle button').forEach(b=>b.classList.toggle('on',b.dataset.m===(edit?'edit':'preview')));
  const body=$('#fbody');
  if(edit){
    body.innerHTML=`<textarea id="ed" spellcheck="false"></textarea>`;
    $('#ed').value=atual._c||'';
  }else{
    // preview (md) ou texto cru (csv/txt/lock)
    if(atual&&/\.(md)$/i.test(atual.rel))body.innerHTML=`<div class="md">${mdToHtml((atual._c||'').replace(/^---\s*\n[\s\S]*?\n---\s*\n/,''))}</div>`;
    else body.innerHTML=`<div class="md"><pre style="white-space:pre-wrap;font-family:'IBM Plex Mono',monospace;font-size:var(--fs-meta);line-height:1.6">${esc(atual._c||'')}</pre></div>`;
  }
}
document.querySelectorAll('#toggle button').forEach(b=>b.onclick=()=>setModo(b.dataset.m));
$('#salvar').onclick=async()=>{
  if(!atual)return; const btn=$('#salvar'); btn.disabled=true;
  atual._c=$('#ed').value;
  try{await fetch('/api/contexto/'+atual.rel.split('/').map(encodeURIComponent).join('/'),{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({conteudo:atual._c})});
    const s=$('#salvo');s.classList.add('on');clearTimeout(s._t);s._t=setTimeout(()=>s.classList.remove('on'),1600);}
  catch(e){}
  setTimeout(()=>btn.disabled=false,300);
};

// puxar do site
$('#btn-puxar').onclick=async()=>{
  const url=$('#url').value.trim(); if(!url){return;}
  const btn=$('#btn-puxar'), st=$('#puxar-st');
  btn.disabled=true; st.className='st'; st.textContent='Lendo o site... isso leva de 30s a 2min (o Claude Code tá navegando).';
  try{
    const r=await fetch('/api/contexto/puxar-site',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url})});
    const j=await r.json();
    if(j.ok){st.className='st ok';st.textContent='Pronto! Escrevi em '+j.arquivo+'. O time já vai usar isso.';$('#url').value='';await carregar();const alvo=arquivos.find(a=>a.rel===j.arquivo);if(alvo)abrir(alvo.rel);}
    else{st.className='st err';st.textContent=j.erro||'não consegui ler o site';}
  }catch(e){st.className='st err';st.textContent='falhou ao chamar o servidor';}
  btn.disabled=false;
};
$('#url').addEventListener('keydown',e=>{if(e.key==='Enter')$('#btn-puxar').click();});

async function carregar(){
  if(DEMO){arquivos=MOCK_CTX;renderLista();return;}
  try{const r=await fetch('/api/contexto');arquivos=(await r.json()).arquivos||[];renderLista();}catch(e){}
}
carregar();
</script>
</body>
</html>
