<!DOCTYPE html>
<!-- DS: Control Room (../../agentic-os/docs/design-system-control-room.md) · JARVIS elegante.
     View "Contexto" do shell: o knowledge vault do OS. Navega e edita os .md do contexto/
     (perfil, fonte, e a árvore de referencia/), e deixa o comprador PUXAR o site da empresa
     (o Claude Code lê a URL e escreve o brief em referencia/). Preview antes de Editar. -->
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>Contexto · Meu OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root{
    --void:#0A0D12; --surface-1:#10151C; --surface-2:#161C25; --surface-3:#1D2530;
    --line:#212934; --line-hud:rgba(83,231,234,.20);
    --text:#E6ECF2; --text-dim:#93A0AD; --text-muted:#58646F;
    --cyan:#53E7EA; --cyan-deep:#1C6E77;
    --amber:#E0A44C; --amber-glow:#F5C97A;
    --live:#56C8B0; --warn:#E0A44C; --error:#D2685E;
    --panel-bg:linear-gradient(180deg,rgba(22,28,37,.7),rgba(16,21,28,.7));
    --panel-glow:inset 0 0 30px -20px rgba(83,231,234,.4),0 8px 24px -14px rgba(0,0,0,.6);
    --r-sm:4px; --r-md:8px; --r-lg:12px;
    --fs-micro:10px; --fs-meta:12px; --fs-body:14px; --fs-emph:15px; --fs-card:17px; --fs-title:20px; --fs-detail:24px; --fs-hero:34px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  *{scrollbar-width:thin;scrollbar-color:var(--surface-3) transparent}
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:5px}
  ::-webkit-scrollbar-thumb:hover{background:#2b3542}
  html,body{height:100%;overflow:hidden}
  body{background:var(--void);color:var(--text);font-family:"Space Grotesk",system-ui,sans-serif;
    font-size:var(--fs-body);line-height:1.5;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;height:100vh}
  a{color:var(--cyan)}
  header{display:flex;align-items:center;justify-content:space-between;padding:15px 24px;border-bottom:1px solid var(--line);flex:0 0 auto}
  header h1{font-size:var(--fs-title);font-weight:600}header h1 span{font-size:var(--fs-micro);letter-spacing:.22em;color:var(--text-muted);display:block;margin-top:3px;text-transform:uppercase}
  #cnt{font-family:"IBM Plex Mono",monospace;font-size:var(--fs-meta);color:var(--text-muted)}
  .wrap{position:relative;flex:1 1 auto;display:grid;grid-template-columns:var(--fw,288px) 1fr;overflow:hidden}
  /* alça de redimensionar a lista (arrasta pro lado; 2x-clique reseta) */
  .rez{position:absolute;top:0;left:var(--fw,288px);transform:translateX(-3px);width:7px;height:100%;cursor:col-resize;z-index:6}
  .rez::after{content:"";position:absolute;top:0;bottom:0;left:3px;width:1px;background:transparent;transition:background .15s}
  .rez:hover::after,.rez.drag::after{background:var(--cyan)}
  body.rezing{cursor:col-resize;user-select:none}
  /* lista */
  .lista{border-right:1px solid var(--line);overflow-y:auto;padding:16px 12px;display:flex;flex-direction:column;gap:4px}
  .puxar{position:relative;background:linear-gradient(180deg,rgba(83,231,234,.05),rgba(16,21,28,.72));border:1px solid var(--line-hud);border-radius:var(--r-lg);padding:13px;margin-bottom:12px}
  .puxar .pt{font-size:var(--fs-micro);letter-spacing:.14em;color:var(--cyan);text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:7px;font-weight:500}
  .puxar p{font-size:var(--fs-micro);color:var(--text-muted);line-height:1.5;margin-bottom:9px}
  .puxar input{width:100%;background:var(--surface-1);border:1px solid var(--line);border-radius:var(--r-md);color:var(--text);font-family:"Space Grotesk",sans-serif;font-size:var(--fs-meta);padding:9px 11px}
  .puxar input:focus{outline:none;border-color:var(--cyan);box-shadow:inset 0 0 16px -12px rgba(83,231,234,.6)}
  .puxar button{width:100%;margin-top:8px;font-family:"Space Grotesk",sans-serif;border:1px solid var(--cyan);border-radius:var(--r-md);padding:9px;cursor:pointer;font-size:var(--fs-meta);font-weight:600;
    background:var(--surface-2);color:var(--text);box-shadow:0 0 18px -8px rgba(83,231,234,.5),inset 0 0 12px -8px rgba(83,231,234,.4);transition:all .2s}
  .puxar button:hover{box-shadow:0 0 22px -6px rgba(83,231,234,.7),inset 0 0 14px -6px rgba(83,231,234,.5)}
  .puxar button:disabled{opacity:.5;cursor:default;box-shadow:none}
  .puxar .st{font-family:"IBM Plex Mono",monospace;font-size:var(--fs-micro);color:var(--text-muted);margin-top:8px;line-height:1.4;min-height:0}
  .puxar .st.ok{color:var(--live)}.puxar .st.err{color:var(--error)}
  .grupo{font-size:var(--fs-micro);letter-spacing:.18em;color:var(--text-muted);text-transform:uppercase;margin:12px 8px 4px}
  /* árvore: pastas colapsáveis com trilho de indentação (port do painel do founder) */
  .f{display:flex;align-items:center;gap:9px;padding:7px 10px 7px 33px;border-radius:var(--r-md);border:1px solid transparent;cursor:pointer;transition:all .2s;position:relative}
  .f:hover{background:var(--surface-2)}
  .f.sel{background:linear-gradient(90deg,rgba(83,231,234,.08),transparent 70%);border-color:var(--line-hud)}
  .f.sel .nm{color:var(--cyan)}
  .f .ico{font-size:var(--fs-body);opacity:.55;flex-shrink:0}
  .f .nm{flex:1;min-width:0;font-size:var(--fs-meta);color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .f .kb{font-family:"IBM Plex Mono",monospace;font-size:var(--fs-micro);color:var(--text-muted);font-variant-numeric:tabular-nums;flex-shrink:0}
  .f .lock{font-size:var(--fs-meta);color:var(--text-muted);opacity:.7}
  .fold{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--r-md);cursor:pointer;color:var(--text);user-select:none}
  .fold:hover{background:var(--surface-2)}
  .fold .chev{display:flex;align-items:center;justify-content:center;width:15px;height:15px;flex-shrink:0;color:var(--text-muted);transition:transform .18s ease,color .18s}
  .fold:hover .chev{color:var(--text)}
  .fold.open>.chev{transform:rotate(90deg);color:var(--cyan)}
  .fold .ico{font-size:var(--fs-body);flex-shrink:0}
  .fold .nm{font-size:var(--fs-meta);font-weight:600;letter-spacing:.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  /* trilho vertical que liga os filhos ao pai (o look de árvore de verdade) */
  .kids{margin-left:18px;border-left:1px solid var(--line);padding-left:5px}
  .kids:hover{border-left-color:rgba(147,160,173,.32)}
  /* painel do arquivo */
  .painel{overflow:hidden;display:flex;flex-direction:column}
  .fhead{display:flex;align-items:center;gap:14px;padding:14px 24px;border-bottom:1px solid var(--line);flex:0 0 auto}
  .fhead .fnome{flex:1;min-width:0;font-size:var(--fs-emph);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .toggle{display:flex;background:var(--surface-1);border:1px solid var(--line);border-radius:var(--r-md);padding:3px}
  .toggle button{font-family:"Space Grotesk",sans-serif;font-size:var(--fs-meta);color:var(--text-dim);background:transparent;border:0;border-radius:6px;padding:6px 13px;cursor:pointer;transition:all .2s}
  .toggle button.on{color:var(--text);background:rgba(83,231,234,.12)}
  .salvar{font-family:"Space Grotesk",sans-serif;border:1px solid var(--cyan);border-radius:var(--r-md);padding:8px 15px;cursor:pointer;font-size:var(--fs-meta);font-weight:600;
    background:var(--surface-2);color:var(--text);box-shadow:0 0 18px -8px rgba(83,231,234,.5),inset 0 0 12px -8px rgba(83,231,234,.4);transition:all .2s}
  .salvar:hover{box-shadow:0 0 22px -6px rgba(83,231,234,.7),inset 0 0 14px -6px rgba(83,231,234,.5)}
  .salvar:disabled{opacity:.5;cursor:default;box-shadow:none}
  .salvo{font-family:"IBM Plex Mono",monospace;font-size:var(--fs-micro);color:var(--live);opacity:0;transition:opacity .3s}.salvo.on{opacity:1}.salvo.err{color:var(--error)}
  .fbody{flex:1 1 auto;overflow-y:auto;padding:24px 30px}
  .fvazio{margin:auto;text-align:center;color:var(--text-muted);font-size:var(--fs-body);line-height:1.7;padding-top:16vh}
  .fvazio .em{font-size:32px;display:block;margin-bottom:12px;opacity:.6;color:var(--cyan-deep)}
  textarea#ed{width:100%;height:100%;min-height:60vh;resize:none;background:var(--surface-1);border:1px solid var(--line);border-radius:var(--r-md);
    color:var(--text);font-family:"IBM Plex Mono",monospace;font-size:var(--fs-meta);line-height:1.7;padding:16px 18px}
  textarea#ed:focus{outline:none;border-color:var(--cyan);box-shadow:inset 0 0 18px -12px rgba(83,231,234,.6)}
  /* markdown render */
  .md{max-width:760px;font-size:var(--fs-body);line-height:1.7;color:var(--text-dim)}
  .md h1{font-size:var(--fs-detail);font-weight:600;margin:4px 0 14px;color:var(--text)}
  .md h2{font-size:var(--fs-card);font-weight:600;margin:22px 0 10px;color:var(--text)}
  .md h3{font-size:var(--fs-emph);font-weight:600;margin:18px 0 8px;color:var(--text)}
  .md p{margin:10px 0}.md ul{margin:10px 0 10px 22px}.md li{margin:5px 0}
  .md code{font-family:"IBM Plex Mono",monospace;font-size:var(--fs-meta);background:rgba(83,231,234,.1);border:1px solid rgba(83,231,234,.2);border-radius:var(--r-sm);padding:1px 6px;color:var(--cyan)}
  .md hr{border:0;border-top:1px solid var(--line);margin:20px 0}
  .md b,.md strong{color:var(--text)}
  .md pre{background:var(--surface-1);border:1px solid var(--line);border-radius:var(--r-md);padding:14px;overflow-x:auto;font-family:"IBM Plex Mono",monospace;font-size:var(--fs-meta);line-height:1.6}
  .md pre code{background:none;border:none;padding:0;color:var(--text-dim)}
  .md table{border-collapse:collapse;display:block;overflow-x:auto;margin:12px 0}
  .md th,.md td{border:1px solid var(--line);padding:6px 10px;font-size:var(--fs-meta)}
  .md blockquote{border-left:3px solid var(--cyan-deep);padding:4px 14px;color:var(--text-dim);margin:10px 0}
  .md ol{margin:10px 0 10px 22px}
  @media(max-width:820px){.wrap{grid-template-columns:1fr}.lista{display:none}.rez{display:none}}
</style>
</head>
<body>
<header><h1>Contexto<span>Knowledge vault do seu OS</span></h1><div id="cnt"></div></header>
<div class="wrap">
  <div class="lista" id="lista">
    <div class="puxar">
      <div class="pt">⬇ Puxar do site</div>
      <p>Cola o link da sua empresa. O seu Claude Code lê o site e escreve um resumo do negócio aqui, na sua assinatura.</p>
      <input id="url" placeholder="suaempresa.com.br" autocomplete="off">
      <button id="btn-puxar">Ler o site →</button>
      <div class="st" id="puxar-st"></div>
    </div>
    <div id="arquivos"></div>
  </div>
  <div class="rez" id="rez" title="arraste pra alargar (clique duplo reseta)"></div>
  <div class="painel">
    <div class="fhead" id="fhead" style="display:none">
      <div class="fnome" id="fnome">—</div>
      <span class="salvo" id="salvo">salvo ✓</span>
      <div class="toggle" id="toggle"><button data-m="preview" class="on">Preview</button><button data-m="edit">Editar</button></div>
      <button class="salvar" id="salvar" style="display:none">Salvar</button>
    </div>
    <div class="fbody" id="fbody"><div class="fvazio"><span class="em">◫</span>Escolha um arquivo do contexto pra ver ou editar.<br>Ou puxe o site da sua empresa pra o time nascer sabendo do negócio.</div></div>
  </div>
</div>
<script>
'use strict';
const $=s=>document.querySelector(s);
const esc=s=>String(s??'').replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));
let arquivos=[], atual=null, modo='preview', sujo=false;
const DEMO=false; // modo demo é só do dev, removido do build do aluno
const MOCK_CTX=[
  {rel:'CLAUDE.md',nome:'CLAUDE.md',pasta:'',kb:0.2,editavel:true},
  {rel:'contexto/perfil.md',nome:'perfil.md',pasta:'contexto',kb:0.1,editavel:true},
  {rel:'contexto/fonte.md',nome:'fonte.md',pasta:'contexto',kb:0.1,editavel:true},
  {rel:'contexto/referencia/negocio.md',nome:'negocio.md',pasta:'contexto/referencia',kb:0.4,editavel:true},
  // só o README: a cena mostra ONDE a planilha entra, sem fingir que já entrou (o integrações
  // do demo mostra a fonte como "a conectar", e um .xlsx aqui tornaria a fonte "conectada").
  {rel:'contexto/dados/README.md',nome:'README.md',pasta:'contexto/dados',kb:1.7,editavel:false},
];
const MOCK_CONT={
  'CLAUDE.md':'# Meu OS\n\nSistema operacional pessoal montado pelo Genesis. Coordenador comercial numa indústria de médio porte.\n\n## Meu time\n- analista-comercial, controller, tradutor-de-negocio, design-system\n',
  'contexto/perfil.md':'# Quem sou eu\n\n- Coordenador comercial numa indústria de médio porte\n- Decide por região, produto e vendedor\n- Recebe o faturamento em planilha e não confia no número\n',
  'contexto/fonte.md':'# Minha fonte de dados\n\n**Relatório gerencial de faturamento**: o export mensal do ERP, em planilha, com subtotal por região.\n',
  'contexto/referencia/negocio.md':'# O negócio\n\nIndústria Campo Novo, fabricante de médio porte que vende em cinco regiões do país (Sudeste, Sul, Nordeste, Centro-Oeste, Norte), nas linhas Alfa, Beta, Gama e Delta. Faturamento 2025 ~R$ 10 milhões. A diretoria comercial cobra faturamento e margem por região, produto e vendedor.\n',
};

// Markdown: online usa o marked (GFM completo: fence, tabela, lista aninhada);
// offline cai no mdBotLocal, que protege os fences ANTES de qualquer regex
// (era o bug: a crase da cerca pareava com crase inline e fatiava o arquivo).
function render(md){
  if(window.marked){try{return sanear(marked.parse(String(md??'')));}catch(e){}}
  return mdBotLocal(md);
}
// saneamento leve do HTML do marked: derruba tag perigosa, handler inline e URL javascript:
function sanear(html){
  const t=document.createElement('template'); t.innerHTML=html;
  t.content.querySelectorAll('script,iframe,object,embed').forEach(el=>el.remove());
  t.content.querySelectorAll('*').forEach(el=>{
    for(const at of [...el.attributes]){
      const n=at.name.toLowerCase();
      if(n.startsWith('on'))el.removeAttribute(at.name);
      else if((n==='href'||n==='src'||n==='xlink:href')&&/^\s*javascript:/i.test(at.value))el.removeAttribute(at.name);
    }
  });
  return t.innerHTML;
}
function mdBotLocal(src){
  let s=String(src??'').replace(/\r\n?/g,'\n');
  const blocos=[];  // fenced code fora do caminho das regex, restaura no fim
  s=s.replace(/```[\w-]*\n?([\s\S]*?)```/g,(_,code)=>{
    blocos.push('<pre><code>'+esc(code.replace(/\n$/,''))+'</code></pre>');
    return '\u0000'+(blocos.length-1)+'\u0000';});
  s=esc(s);
  s=s.replace(/^\s{0,3}(#{1,6})\s+(.*)$/gm,(_,cerq,tit)=>{const n=Math.min(cerq.length,3);return '\n\n<h'+n+'>'+tit.trim()+'</h'+n+'>\n\n';});
  s=s.replace(/^\s{0,3}(?:&gt;)\s?(.*)$/gm,'\n\n<blockquote>$1</blockquote>\n\n');
  s=s.replace(/^\s*([-*_])(?:\s*\1){2,}\s*$/gm,'\n\n<hr>\n\n');
  s=s.replace(/(?:^|\n)((?:[ \t]*[-*+]\s+.*(?:\n|$))+)/g,(_,bloco)=>{
    const lis=bloco.trim().split(/\n/).map(l=>'<li>'+l.replace(/^[ \t]*[-*+]\s+/,'')+'</li>').join('');
    return '\n\n<ul>'+lis+'</ul>\n\n';});
  s=s.replace(/(?:^|\n)((?:[ \t]*\d+[.)]\s+.*(?:\n|$))+)/g,(_,bloco)=>{
    const lis=bloco.trim().split(/\n/).map(l=>'<li>'+l.replace(/^[ \t]*\d+[.)]\s+/,'')+'</li>').join('');
    return '\n\n<ol>'+lis+'</ol>\n\n';});
  s=s.replace(/`([^`\n]+)`/g,'<code>$1</code>');
  s=s.replace(/\*\*([^*]+?)\*\*/g,'<b>$1</b>');
  s=s.replace(/(^|[^*\w])\*([^*\n]+?)\*(?=[^*\w]|$)/g,'$1<i>$2</i>');
  s=s.replace(/(^|[^_\w])_([^_\n]+?)_(?=[^_\w]|$)/g,'$1<i>$2</i>');
  s=s.replace(/\[([^\]]+)\]\((https?:[^)\s]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  s=s.split(/\n{2,}/).map(b=>{b=b.trim();
    if(!b)return '';
    return /^<(ul|ol|pre|blockquote|h[1-6]|hr)|^\u0000/.test(b)?b:'<p>'+b.replace(/\n/g,'<br>')+'</p>';
  }).join('\n');
  return s.replace(/\u0000(\d+)\u0000/g,(_,i)=>blocos[+i]);
}

// árvore: CLAUDE.md raiz no topo, pastas auto-expandidas (só _archive colapsa)
function construirArvore(arqs){
  const raiz={pastas:{},arquivos:[]};
  arqs.slice().sort((a,b)=>a.rel.localeCompare(b.rel)).forEach(a=>{const partes=a.rel.split('/');let no=raiz;
    for(let i=0;i<partes.length-1;i++){const p=partes[i];no.pastas[p]=no.pastas[p]||{pastas:{},arquivos:[]};no=no.pastas[p];}
    no.arquivos.push(a);});
  return raiz;
}
const abertos=new Set(); let treeInit=false;
function autoAbrir(no,caminho){Object.keys(no.pastas).forEach(nome=>{const c=caminho?caminho+'/'+nome:nome;
  if(nome!=='_archive')abertos.add(c);autoAbrir(no.pastas[nome],c);});}
const CHEV='<svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>';
function renderFiles(files,nivel){
  return files.slice().sort((a,b)=>{
    if(nivel===0){if(a.nome==='CLAUDE.md')return -1;if(b.nome==='CLAUDE.md')return 1;}
    return a.nome.localeCompare(b.nome);
  }).map(a=>`<div class="f ${atual&&atual.rel===a.rel?'sel':''}" data-rel="${esc(a.rel)}"><span class="ico">${a.editavel?'📝':'📄'}</span><span class="nm">${esc(a.nome)}</span>${a.editavel?'':'<span class="lock" title="só leitura">🔒</span>'}<span class="kb">${esc(a.kb)}kb</span></div>`).join('');
}
function renderNo(no,caminho,nivel){
  let h='';
  // na raiz, os arquivos (o CLAUDE.md mestre) vêm ANTES das pastas: mapa no topo
  if(nivel===0)h+=renderFiles(no.arquivos,0);
  Object.keys(no.pastas).sort().forEach(nome=>{
    const c=caminho?caminho+'/'+nome:nome,ab=abertos.has(c);
    h+=`<div class="fold ${ab?'open':''}" data-p="${esc(c)}"><span class="chev">${CHEV}</span><span class="ico">${ab?'📂':'📁'}</span><span class="nm">${esc(nome)}</span></div>`;
    // filhos num container próprio: é ele que desenha o trilho vertical (.kids)
    if(ab)h+=`<div class="kids">${renderNo(no.pastas[nome],c,nivel+1)}</div>`;
  });
  if(nivel!==0)h+=renderFiles(no.arquivos,nivel);
  return h;
}
function renderLista(){
  $('#cnt').textContent=arquivos.length+' arquivos';
  const raiz=construirArvore(arquivos);
  if(!treeInit){autoAbrir(raiz,'');treeInit=true;}
  $('#arquivos').innerHTML=renderNo(raiz,'',0);
}
// delegação de clique: um listener só pra árvore inteira (pasta abre/fecha, arquivo abre)
$('#arquivos').addEventListener('click',e=>{
  const fold=e.target.closest('.fold');
  if(fold){const p=fold.dataset.p;abertos.has(p)?abertos.delete(p):abertos.add(p);renderLista();return;}
  const f=e.target.closest('.f');if(f)abrir(f.dataset.rel);
});
async function abrir(rel){
  const a=arquivos.find(x=>x.rel===rel); if(!a)return;
  if(sujo&&!confirm('Descartar alterações não salvas?'))return;
  sujo=false; atual=a;
  renderLista();
  $('#fhead').style.display='flex'; $('#fnome').textContent=a.nome+(a.editavel?'':' 🔒');
  if(DEMO){atual._c=MOCK_CONT[rel]||'(conteúdo de demo)';setModo('preview');return;}
  try{const r=await fetch('/api/contexto/'+a.rel.split('/').map(encodeURIComponent).join('/'));const j=await r.json();atual._c=j.conteudo||'';}
  catch(e){atual._c='(não consegui ler)';}
  // tudo abre em preview; não-editável fica só em preview (sem Editar/Salvar)
  setModo('preview');
}
function setModo(m){
  // se estava editando o MESMO arquivo, preserva o texto digitado antes de trocar a view
  const edAnt=$('#ed'); if(edAnt&&atual&&edAnt.dataset.rel===atual.rel)atual._c=edAnt.value;
  const edit=(m==='edit'&&!!atual&&!!atual.editavel);
  modo=edit?'edit':'preview';
  $('#toggle').style.display=atual&&atual.editavel?'flex':'none';
  $('#salvar').style.display=edit?'inline-block':'none';
  document.querySelectorAll('#toggle button').forEach(b=>b.classList.toggle('on',b.dataset.m===modo));
  const body=$('#fbody');
  if(edit){
    body.innerHTML=`<textarea id="ed" spellcheck="false"></textarea>`;
    const ed=$('#ed'); ed.value=atual._c||''; ed.dataset.rel=atual.rel;
    ed.addEventListener('input',()=>{sujo=true;});
  }else{
    // preview: .md renderizado; o resto (csv/txt) em texto cru
    if(atual&&/\.md$/i.test(atual.rel))body.innerHTML=`<div class="md">${render((atual._c||'').replace(/^---\s*\n[\s\S]*?\n---\s*\n/,''))}</div>`;
    else body.innerHTML=`<div class="md"><pre style="white-space:pre-wrap;font-family:'IBM Plex Mono',monospace;font-size:var(--fs-meta);line-height:1.6">${esc(atual._c||'')}</pre></div>`;
  }
}
document.querySelectorAll('#toggle button').forEach(b=>b.onclick=()=>setModo(b.dataset.m));
function salvoOk(){const s=$('#salvo');s.textContent='salvo ✓';s.classList.remove('err');s.classList.add('on');
  clearTimeout(s._t);s._t=setTimeout(()=>s.classList.remove('on'),1600);}
function salvoErr(msg){const s=$('#salvo');s.textContent=msg;s.classList.add('err','on');
  clearTimeout(s._t);s._t=setTimeout(()=>{s.classList.remove('on','err');s.textContent='salvo ✓';},5000);}
$('#salvar').onclick=async()=>{
  if(!atual||!atual.editavel||!$('#ed'))return; const btn=$('#salvar'); btn.disabled=true;
  atual._c=$('#ed').value;
  if(DEMO){sujo=false;salvoOk();setTimeout(()=>btn.disabled=false,300);return;}
  try{
    const r=await fetch('/api/contexto/'+atual.rel.split('/').map(encodeURIComponent).join('/'),{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({conteudo:atual._c})});
    let j=null; try{j=await r.json();}catch(_){}
    if(r.ok&&(!j||j.ok!==false)){sujo=false;salvoOk();}
    else salvoErr((j&&j.erro)?('não salvou: '+j.erro):'não salvou, recarregue a página');
  }catch(e){salvoErr('não salvou, recarregue a página');}
  setTimeout(()=>btn.disabled=false,300);
};
// Ctrl/Cmd+S salva no modo edição
window.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='s'&&modo==='edit'&&atual&&atual.editavel){e.preventDefault();$('#salvar').click();}
});
// redimensionar a lista (largura persistida em localStorage; 2x-clique reseta)
(function(){
  const cols=document.querySelector('.wrap'), rez=$('#rez');
  const setFW=w=>{const fw=Math.max(220,Math.min(Math.round(w),640));cols.style.setProperty('--fw',fw+'px');localStorage.setItem('ctx_fw',fw);};
  setFW(parseInt(localStorage.getItem('ctx_fw')||'288',10));
  rez.addEventListener('pointerdown',e=>{
    e.preventDefault(); rez.classList.add('drag'); document.body.classList.add('rezing');
    const move=ev=>setFW(ev.clientX-cols.getBoundingClientRect().left);
    const up=()=>{rez.classList.remove('drag');document.body.classList.remove('rezing');
      window.removeEventListener('pointermove',move);window.removeEventListener('pointerup',up);};
    window.addEventListener('pointermove',move); window.addEventListener('pointerup',up);
  });
  rez.addEventListener('dblclick',()=>setFW(288));
})();

// puxar do site
$('#btn-puxar').onclick=async()=>{
  const url=$('#url').value.trim(); if(!url){return;}
  const btn=$('#btn-puxar'), st=$('#puxar-st');
  btn.disabled=true; st.className='st'; st.textContent='Lendo o site... isso leva de 30s a 2min (o Claude Code tá navegando).';
  try{
    const r=await fetch('/api/contexto/puxar-site',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url})});
    const j=await r.json();
    if(j.ok){st.className='st ok';st.textContent='Pronto! Escrevi em '+j.arquivo+'. O time já vai usar isso.';$('#url').value='';await carregar();const alvo=arquivos.find(a=>a.rel===j.arquivo);if(alvo)abrir(alvo.rel);}
    else{st.className='st err';st.textContent=j.erro||'não consegui ler o site';}
  }catch(e){st.className='st err';st.textContent='falhou ao chamar o servidor';}
  btn.disabled=false;
};
$('#url').addEventListener('keydown',e=>{if(e.key==='Enter')$('#btn-puxar').click();});

async function carregar(){
  if(DEMO){arquivos=MOCK_CTX;renderLista();return;}
  try{const r=await fetch('/api/contexto');arquivos=(await r.json()).arquivos||[];renderLista();}catch(e){}
}
carregar();
</script>
