<!DOCTYPE html>
<!-- View "Skills" do shell: catálogo das skills do OS (.claude/skills/) + editor do SKILL.md.
     Lista as skills sob medida, com a /extrair-design-system marcada como obrigatória.
     Preview antes de Editar. Lê /api/skills e /api/skill/<slug>. -->
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>Skills · Meu OS</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--cyan:#4FE3E8;--gold:#E8C9A0;--amber:#FFB347;--purple:#9F7BFF;--live:#3FD98A;
    --txt:#DFE8F2;--dim:#7C90AC;--bg:#04070C;--card:#0A0F16;--card2:#0C121B;--linha:rgba(124,144,172,.16)}
  *{margin:0;padding:0;box-sizing:border-box}
  *{scrollbar-width:thin;scrollbar-color:rgba(124,144,172,.28) transparent}
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:rgba(124,144,172,.26);border-radius:99px;border:2px solid transparent;background-clip:padding-box}
  ::-webkit-scrollbar-thumb:hover{background:rgba(79,227,232,.42);background-clip:padding-box}
  html,body{height:100%;overflow:hidden}
  body{background:var(--bg);color:var(--txt);font-family:'Space Grotesk','Segoe UI',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;display:flex;flex-direction:column;height:100vh}
  a{color:var(--cyan)}
  header{display:flex;align-items:center;justify-content:space-between;padding:15px 24px;border-bottom:1px solid var(--linha);flex:0 0 auto}
  header h1{font-size:15px;font-weight:700}header h1 span{font-size:9px;letter-spacing:.24em;color:var(--dim);display:block;margin-top:3px;text-transform:uppercase}
  .wrap{flex:1 1 auto;display:grid;grid-template-columns:320px 1fr;overflow:hidden}
  .lista{border-right:1px solid var(--linha);overflow-y:auto;padding:14px 12px;display:flex;flex-direction:column;gap:8px}
  .sk{background:linear-gradient(180deg,var(--card2),var(--card));border:1px solid var(--linha);border-radius:13px;padding:13px 14px;cursor:pointer;transition:all .15s}
  .sk:hover{border-color:rgba(124,144,172,.36)}
  .sk.sel{border-color:rgba(79,227,232,.4);background:rgba(79,227,232,.06)}
  .sk-top{display:flex;align-items:center;gap:11px}
  .sk-ico{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;font-size:17px;flex-shrink:0;background:rgba(159,123,255,.1);border:1px solid rgba(159,123,255,.3)}
  .sk-id{flex:1;min-width:0}
  .sk-cmd{font-family:ui-monospace,Consolas,monospace;font-size:13px;font-weight:600;color:var(--purple);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sk-nome{font-size:11px;color:var(--dim);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sk-desc{font-size:11.5px;color:var(--dim);line-height:1.45;margin-top:9px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .sk-badge{font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);background:rgba(232,201,160,.12);border:1px solid rgba(232,201,160,.3);border-radius:5px;padding:2px 6px;margin-left:auto;flex-shrink:0}
  .painel{overflow:hidden;display:flex;flex-direction:column}
  .fhead{display:flex;align-items:center;gap:14px;padding:15px 24px;border-bottom:1px solid var(--linha);flex:0 0 auto}
  .fhead .fnome{flex:1;min-width:0;font-family:ui-monospace,Consolas,monospace;font-size:15px;font-weight:600;color:var(--purple);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .toggle{display:flex;background:var(--card);border:1px solid var(--linha);border-radius:9px;padding:3px}
  .toggle button{font-family:inherit;font-size:12px;color:var(--dim);background:transparent;border:0;border-radius:6px;padding:6px 13px;cursor:pointer}
  .toggle button.on{color:var(--txt);background:rgba(79,227,232,.14)}
  .salvar{border:0;border-radius:9px;padding:8px 15px;cursor:pointer;font-family:inherit;font-size:12.5px;font-weight:600;background:linear-gradient(135deg,var(--cyan),var(--purple));color:var(--bg)}
  .salvar:disabled{opacity:.5;cursor:default}
  .salvo{font-size:11px;color:var(--live);opacity:0;transition:opacity .3s}.salvo.on{opacity:1}
  .fbody{flex:1 1 auto;overflow-y:auto;padding:24px 30px}
  .fvazio{margin:auto;text-align:center;color:var(--dim);font-size:13px;line-height:1.7;padding-top:16vh}
  .fvazio .em{font-size:34px;display:block;margin-bottom:12px;opacity:.7}
  textarea#ed{width:100%;height:100%;min-height:60vh;resize:none;background:var(--card2);border:1px solid var(--linha);border-radius:12px;
    color:var(--txt);font-family:ui-monospace,Consolas,monospace;font-size:13px;line-height:1.65;padding:16px 18px}
  textarea#ed:focus{outline:none;border-color:rgba(79,227,232,.4)}
  .md{max-width:760px;font-size:14px;line-height:1.7;color:var(--txt)}
  .md h1{font-size:22px;font-weight:700;margin:4px 0 14px}
  .md h2{font-size:17px;font-weight:700;margin:22px 0 10px;color:var(--gold)}
  .md h3{font-size:15px;font-weight:600;margin:18px 0 8px}
  .md p{margin:10px 0}.md ul{margin:10px 0 10px 22px}.md li{margin:5px 0}
  .md code{font-family:ui-monospace,Consolas,monospace;font-size:12.5px;background:rgba(79,227,232,.1);border:1px solid rgba(79,227,232,.2);border-radius:5px;padding:1px 6px;color:var(--cyan)}
  .md hr{border:0;border-top:1px solid var(--linha);margin:20px 0}.md b{color:#fff}
  @media(max-width:820px){.wrap{grid-template-columns:1fr}.lista{display:none}}
</style>
</head>
<body>
<header><h1>Skills<span>As automações sob medida do seu OS</span></h1><div id="cnt" style="font-size:11px;color:var(--dim)"></div></header>
<div class="wrap">
  <div class="lista" id="lista"></div>
  <div class="painel">
    <div class="fhead" id="fhead" style="display:none">
      <div class="fnome" id="fnome">—</div>
      <span class="salvo" id="salvo">salvo ✓</span>
      <div class="toggle" id="toggle"><button data-m="preview" class="on">Preview</button><button data-m="edit">Editar</button></div>
      <button class="salvar" id="salvar" style="display:none">Salvar</button>
    </div>
    <div class="fbody" id="fbody"><div class="fvazio"><span class="em">◇</span>Escolha uma skill pra ver o que ela faz ou editar.<br>Cada skill é uma automação que o seu Claude Code executa de verdade.</div></div>
  </div>
</div>
<script>
'use strict';
const $=s=>document.querySelector(s);
const esc=s=>String(s??'').replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));
let skills=[], atual=null;
const DEMO=/[?&]demo/.test(location.search);
const MOCK_SK=[
  {slug:'nova-view',nome:'Nova view',ic:'⚡',cmd:'/nova-view',desc:'Gera a view SQL a partir da necessidade do dashboard.'},
  {slug:'modelo-financeiro',nome:'Modelo financeiro',ic:'📊',cmd:'/modelo-financeiro',desc:'Monta o modelo estrela do financeiro no Power BI.'},
  {slug:'extrair-design-system',nome:'Extrair design system',ic:'🎨',cmd:'/extrair-design-system',desc:'Extrai o design system de uma referência e gera o DS do seu OS.',obrigatoria:true},
];
const MOCK_SKC={
  'nova-view':'---\nname: nova-view\n---\n\n# Nova view\n\nGera a view SQL a partir da necessidade do dashboard.\n\n## Processo\n1. Entende a métrica pedida\n2. Desenha a view mínima\n3. Valida performance e documenta\n',
  'modelo-financeiro':'---\nname: modelo-financeiro\n---\n\n# Modelo financeiro\n\nMonta o modelo estrela (fato + dimensões) do financeiro no Power BI, com medidas DAX limpas.\n',
  'extrair-design-system':'---\nname: extrair-design-system\n---\n\n# Extrair design system\n\nExtrai o design system de uma referência (HTML, URL, print) e gera o DS do seu OS.\n',
};

function mdToHtml(md){
  let h=esc(md);
  h=h.replace(/^### (.*)$/gm,'<h3>$1</h3>').replace(/^## (.*)$/gm,'<h2>$1</h2>').replace(/^# (.*)$/gm,'<h1>$1</h1>');
  h=h.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  h=h.replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>');
  h=h.replace(/`([^`]+)`/g,'<code>$1</code>');
  h=h.replace(/^\s*[-*] (.*)$/gm,'<li>$1</li>');
  h=h.replace(/(?:<li>.*<\/li>\s*)+/g,m=>'<ul>'+m+'</ul>');
  h=h.replace(/^---+$/gm,'<hr>');
  return h.split(/\n{2,}/).map(b=>{b=b.trim();return /^<(h\d|ul|hr|p|pre)/.test(b)?b:(b?'<p>'+b.replace(/\n/g,'<br>')+'</p>':'');}).join('\n');
}
function renderLista(){
  $('#cnt').textContent=skills.length+' skills';
  $('#lista').innerHTML=skills.map(s=>`
    <div class="sk ${atual&&atual.slug===s.slug?'sel':''}" data-slug="${esc(s.slug)}">
      <div class="sk-top"><div class="sk-ico">${esc(s.ic||'⚡')}</div>
        <div class="sk-id"><div class="sk-cmd">${esc(s.cmd||('/'+s.slug))}</div><div class="sk-nome">${esc(s.nome||s.slug)}</div></div>
        ${s.obrigatoria?'<span class="sk-badge">obrig.</span>':''}</div>
      <div class="sk-desc">${esc((s.desc||'').slice(0,140)||'Automação sob medida do seu OS.')}</div>
    </div>`).join('')||'<div class="fvazio" style="padding-top:8vh"><span class="em">◇</span>Sem skills ainda. Elas nascem quando você monta o time.</div>';
  document.querySelectorAll('.sk').forEach(el=>el.onclick=()=>abrir(el.dataset.slug));
}
async function abrir(slug){
  const s=skills.find(x=>x.slug===slug); if(!s)return; atual=s; renderLista();
  s.ic=s.ic||'⚡';
  $('#fhead').style.display='flex'; $('#fnome').textContent=s.cmd||('/'+s.slug);
  if(DEMO){atual._c=MOCK_SKC[slug]||('# '+s.nome+'\n\n(conteúdo de demo)');setModo('preview');return;}
  try{const r=await fetch('/api/skill/'+encodeURIComponent(slug));atual._c=(await r.json()).conteudo||'';}
  catch(e){atual._c='(não consegui ler)';}
  setModo('preview');
}
function setModo(m){
  const edit=(m==='edit');
  $('#salvar').style.display=edit?'inline-block':'none';
  document.querySelectorAll('#toggle button').forEach(b=>b.classList.toggle('on',b.dataset.m===m));
  const body=$('#fbody');
  if(edit){body.innerHTML=`<textarea id="ed" spellcheck="false"></textarea>`;$('#ed').value=atual._c||'';}
  else body.innerHTML=`<div class="md">${mdToHtml((atual._c||'').replace(/^---\s*\n[\s\S]*?\n---\s*\n/,''))}</div>`;
}
document.querySelectorAll('#toggle button').forEach(b=>b.onclick=()=>setModo(b.dataset.m));
$('#salvar').onclick=async()=>{
  if(!atual)return; const btn=$('#salvar'); btn.disabled=true; atual._c=$('#ed').value;
  try{await fetch('/api/skill/'+encodeURIComponent(atual.slug),{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({conteudo:atual._c})});
    const s=$('#salvo');s.classList.add('on');clearTimeout(s._t);s._t=setTimeout(()=>s.classList.remove('on'),1600);}
  catch(e){}
  setTimeout(()=>btn.disabled=false,300);
};
async function carregar(){if(DEMO){skills=MOCK_SK;renderLista();return;}try{const r=await fetch('/api/skills');skills=(await r.json()).skills||[];renderLista();}catch(e){}}
carregar();
</script>
</body>
</html>
