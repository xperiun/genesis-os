<!DOCTYPE html>
<!-- Painel do OS do comprador, SHELL puro (estilo Paperclip/demarly): sidebar + uma view
     por iframe. Cada view é uma página self-contained (dashboard, agentes, tasks,
     contextos, skills, integracoes). O router troca a view sem recarregar a página.
     SEM o X (o orb de voz é só do founder): aqui o home é o Painel. -->
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>Meu OS · Sala de Controle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cyan:#4FE3E8; --gold:#E8C9A0; --amber:#FFB347; --purple:#9F7BFF;
    --red:#FF5252; --live:#3FD98A; --txt:#DFE8F2; --dim:#7C90AC; --bg:#04070C;
    --card:#0A0F16; --card2:#0C121B; --linha:rgba(124,144,172,.16);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  /* barras de rolagem finas, no DS */
  *{scrollbar-width:thin;scrollbar-color:rgba(124,144,172,.28) transparent}
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:rgba(124,144,172,.26);border-radius:99px;border:2px solid transparent;background-clip:padding-box}
  ::-webkit-scrollbar-thumb:hover{background:rgba(79,227,232,.42);background-clip:padding-box}
  ::-webkit-scrollbar-corner{background:transparent}
  html,body{height:100%}
  body{background:var(--bg);color:var(--txt);font-family:'Space Grotesk','Segoe UI',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;overflow:hidden}
  a{color:inherit;text-decoration:none}
  .app{display:flex;height:100vh}
  /* ---- sidebar ---- */
  .side{width:216px;flex:0 0 auto;display:flex;flex-direction:column;gap:3px;padding:16px 12px;
    border-right:1px solid var(--linha);background:linear-gradient(180deg,#060A11,#04070C);
    overflow-y:auto;z-index:30}
  .side-brand{display:flex;align-items:center;gap:11px;padding:6px 8px 18px}
  .side-brand .x{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;
    font-weight:700;font-size:16px;color:var(--bg);flex-shrink:0;
    background:linear-gradient(135deg,var(--cyan),var(--purple));box-shadow:0 0 18px rgba(79,227,232,.35)}
  .side-brand b{font-weight:700;letter-spacing:.16em;font-size:12px;display:block}
  .side-brand span{font-size:8.5px;letter-spacing:.22em;color:var(--dim);display:block;margin-top:2px}
  .side-nav{display:flex;flex-direction:column;gap:3px;margin-top:2px}
  .side-nav a{display:flex;align-items:center;gap:11px;font-size:13px;color:var(--dim);
    padding:10px 12px;border-radius:10px;border:1px solid transparent;cursor:pointer;transition:all .15s}
  .side-nav a i{font-style:normal;font-size:14px;width:18px;text-align:center;opacity:.9;flex-shrink:0}
  .side-nav a:hover{color:var(--txt);background:rgba(124,144,172,.1)}
  .side-nav a.active{color:var(--txt);background:rgba(79,227,232,.1);border-color:rgba(79,227,232,.28)}
  .side-rodape{margin-top:auto;font-size:10px;color:var(--dim);padding:14px 12px 4px;letter-spacing:.06em;line-height:1.6}
  .side-rodape b{color:var(--gold);font-weight:600}
  /* ---- content / views ---- */
  .content{flex:1 1 auto;height:100vh;overflow:hidden;position:relative}
  .view{display:none;height:100%}
  .view.active{display:block}
  .view iframe{width:100%;height:100%;border:0;display:block;background:var(--bg)}
  @media(max-width:720px){
    .side{width:56px;padding:12px 6px}
    .side-brand{justify-content:center;padding:6px 0 14px}
    .side-brand>div{display:none}
    .side-nav a{justify-content:center;padding:11px 0;gap:0}
    .side span{display:none}
    .side-rodape{display:none}
  }
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="side-brand">
      <div class="x">◆</div>
      <div><b>MEU OS</b><span>SALA DE CONTROLE</span></div>
    </div>
    <nav class="side-nav">
      <a href="#painel" data-view="painel" class="active"><i>▦</i><span>Painel</span></a>
      <a href="#agentes" data-view="agentes"><i>❖</i><span>Meu time</span></a>
      <a href="#tasks" data-view="tasks"><i>▤</i><span>Tarefas</span></a>
      <a href="#contextos" data-view="contextos"><i>◫</i><span>Contexto</span></a>
      <a href="#skills" data-view="skills"><i>◇</i><span>Skills</span></a>
      <a href="#integracoes" data-view="integracoes"><i>⧉</i><span>Integrações</span></a>
    </nav>
    <div class="side-rodape">Montado pelo <b>Genesis</b>.<br>Roda na sua assinatura.</div>
  </aside>
  <div class="content">
    <div class="view active" id="v-painel"><iframe data-src="/dashboard" title="Painel"></iframe></div>
    <div class="view" id="v-agentes"><iframe data-src="/agentes" title="Meu time"></iframe></div>
    <div class="view" id="v-tasks"><iframe data-src="/tasks" title="Tarefas"></iframe></div>
    <div class="view" id="v-contextos"><iframe data-src="/contextos" title="Contexto"></iframe></div>
    <div class="view" id="v-skills"><iframe data-src="/skills" title="Skills"></iframe></div>
    <div class="view" id="v-integracoes"><iframe data-src="/integracoes" title="Integrações"></iframe></div>
  </div>
</div>
<script>
'use strict';
const VIEWS = ['painel','agentes','tasks','contextos','skills','integracoes'];
const DEMO = /[?&]demo/.test(location.search);   // /painel?demo cascateia pra todas as views
function irPara(view){
  if(!VIEWS.includes(view)) view='painel';
  document.querySelectorAll('.side-nav a[data-view]').forEach(a=>a.classList.toggle('active',a.dataset.view===view));
  document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active',v.id==='v-'+view));
  const f=document.querySelector('#v-'+view+' iframe');
  if(f && !f.getAttribute('src')){                       // lazy load (+ propaga ?demo)
    let s=f.dataset.src; if(DEMO)s+=(s.includes('?')?'&':'?')+'demo';
    f.setAttribute('src', s);
  }
  if(location.hash!=='#'+view) history.replaceState(null,'','#'+view);
}
document.querySelectorAll('.side-nav a[data-view]').forEach(a=>
  a.addEventListener('click',e=>{e.preventDefault();irPara(a.dataset.view);}));
window.addEventListener('hashchange',()=>irPara(location.hash.replace('#','')));
irPara(location.hash.replace('#','') || 'painel');
</script>
</body>
</html>
